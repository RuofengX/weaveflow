name: mock_etl_demo
description: "1000 mock user records → parallel filter+sort → split → iterate enrich → stats. For TUI demo."

steps:
  - id: seed
    type: var
    inputs:
      count: 1000

  - id: gen
    type: js
    inputs:
      data: "{seed.output}"
    code: |
      function run(input) {
        var count = input.data.count || 1000;
        var statuses = ['active', 'inactive', 'pending'];
        var records = [];
        for (var i = 0; i < count; i++) {
          records.push({
            id: i + 1,
            name: 'User_' + (i + 1),
            age: 18 + Math.floor(Math.random() * 50),
            status: statuses[Math.floor(Math.random() * 3)],
            score: Math.round(Math.random() * 10000) / 100
          });
        }
        return records;
      }

  - id: filter_active
    type: filter
    inputs:
      data: "{gen.output}"
      field: status
      operator: eq
      value: "active"

  - id: sort_score
    type: sort
    inputs:
      data: "{gen.output}"
      field: score
      order: desc

  - id: split_chunks
    type: split
    inputs:
      data: "{sort_score.output}"
      size: 50

  - id: enrich
    type: js
    iterate:
      over: "{split_chunks.output}"
      as: "chunk"
    code: |
      function run(input) {
        var chunk = input.data;
        for (var i = 0; i < chunk.length; i++) {
          var s = chunk[i].score;
          if (s >= 80) {
            chunk[i].grade = 'A';
          } else if (s >= 50) {
            chunk[i].grade = 'B';
          } else {
            chunk[i].grade = 'C';
          }
        }
        return chunk;
      }

  - id: stats
    type: js
    inputs:
      data: "{enrich.output}"
    code: |
      function run(input) {
        var records = input.data;
        var total = records.length;
        var sum = 0;
        var grades = {A: 0, B: 0, C: 0};
        for (var i = 0; i < total; i++) {
          sum = sum + records[i].score;
          var g = records[i].grade;
          if (grades[g] === undefined) {
            grades[g] = 1;
          } else {
            grades[g] = grades[g] + 1;
          }
        }
        return {
          total: total,
          avg_score: Math.round(sum / total * 100) / 100,
          grades: grades
        };
      }

output: "{stats.output}"
