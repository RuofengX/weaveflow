name: pdf_ocr
description: "扫描件 PDF → 提取内嵌图片 → spark:8000 视觉模型 OCR。自包含，一次 POST 上传。"

slots:
  - name: pdf_path
    schema: { type: string }
    description: "PDF 文件路径（本地或远程 URL）"
  - name: prompt
    schema: { type: string, default: "请提取这些扫描图片中的所有文字内容，保持原文格式。直接输出文字，不要额外说明。" }

steps:
  # 0. 读取 JS 依赖库 — pdf.js 图片提取器
  - id: read_lib
    type: file
    inputs:
      path: pdf_extract_images.js

  # 1. 读取 PDF
  - id: read_pdf
    type: file
    inputs:
      path: "{slots.pdf_path}"

  # 2. 提取 PDF 内嵌图片
  - id: extract
    type: js
    inputs:
      data: "{read_pdf.output}"
    code: |
      {{read_lib.output}}

      function run(input) {
        var pages = pdfExtractImages(input.data_base64);
        if (pages.length === 0) {
          throw new Error("未提取到图片，请确认是扫描件 PDF");
        }
        return { pages: pages, page_count: pages.length };
      }

  # 3. 收集所有页面的 base64 数组
  - id: collect_images
    type: js
    inputs:
      pages: "{extract.output.pages}"
    code: |
      function run(input) {
        return input.config.pages.map(function(p) { return p.base64; });
      }

  # 4. 调用视觉模型 OCR（多图一次性发送）
  - id: ocr
    type: llm
    inputs:
      url: "http://spark:8000/v1/chat/completions"
      model: "nv-community/Gemma-4-26B-A4B-NVFP4"
      system: "你是一个高精度 OCR 引擎。你的唯一任务是识别图片中的文字并原样输出。不要翻译、不要总结、不要添加任何额外说明。直接输出识别到的全部文字内容。"
      prompt: "{slots.prompt}"
      image_base64: "{collect_images.output}"
      max_tokens: 100000
    retry:
      max_attempts: 3
      backoff: exponential
      delay_ms: 2000

output: "{ocr.output}"
