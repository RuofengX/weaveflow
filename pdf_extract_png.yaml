name: pdf_extract_png
description: "PDF(base64输入) → 提取内嵌图片 → 返回 PNG base64 列表。自包含，纯 JS 实现。"
slots:
  - name: pdf_base64
    schema: { type: string }
    description: "PDF 文件的 base64 编码内容"

steps:
  # 0. 读取 JS 提取库
  - id: read_lib
    type: file
    inputs:
      path: /var/home/ruofeng/Coding/weave/pdf_extract_images.js

  # 1. JS 提取图片
  - id: extract
    type: js
    inputs:
      lib: "{read_lib.output}"
      pdf_b64: "{slots.pdf_base64}"
    code: |
      function run(input) {
        var lib = input.config.lib;
        eval(lib);

        var pages = pdfExtractImages(input.config.pdf_b64);
        if (!pages || pages.length === 0) {
          throw new Error("未提取到图片，请确认是扫描件 PDF");
        }

        var result = [];
        for (var i = 0; i < pages.length; i++) {
          var p = pages[i];
          result.push({
            page: p.page,
            width: p.width,
            height: p.height,
            filter: p.filter,
            base64: p.base64
          });
        }
        return { total_images: result.length, images: result };
      }

output: "{extract.output}"
